name: Run CMD Test Suite

on:
  push:
    branches:
      - 'refactor/**' # Run on pushes to any branch starting with 'refactor/'
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: windows-latest
    timeout-minutes: 2

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Create and Run Unit Echo Test
      run: |
        echo @echo off > run_unit_echo.cmd
        echo echo Hello from Unit Tests! >> run_unit_echo.cmd
        call run_unit_echo.cmd
      shell: cmd

  integration-tests:
    runs-on: windows-latest
    timeout-minutes: 2

    steps:
    - name: Check out repository
      uses: actions:checkout@v3

    - name: Create and Run Integration Echo Test
      run: |
        echo @echo off > run_integration_echo.cmd
        echo echo Hello from Integration Tests! >> run_integration_echo.cmd
        call run_integration_echo.cmd
      shell: cmd
