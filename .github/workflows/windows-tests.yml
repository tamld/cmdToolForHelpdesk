name: Run CMD Test Suite

on:
  push:
    branches:
      - 'refactor/**' # Run on pushes to any branch starting with 'refactor/'
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: windows-latest
    timeout-minutes: 2

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Simple Echo Test
      run: echo Hello from Unit Tests!
      shell: cmd

  integration-tests:
    runs-on: windows-latest
    timeout-minutes: 2

    steps:
    - name: Check out repository
      uses: actions:checkout@v3

    - name: Simple Echo Test
      run: echo Hello from Integration Tests!
      shell: cmd
