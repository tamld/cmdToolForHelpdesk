name: Run CMD Test Suite

on:
  push:
    branches:
      - 'refactor/**' # Run on pushes to any branch starting with 'refactor/'
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Run test suite
      run: call tests/test_runner.cmd
      shell: cmd